<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ATTACK 5MOKU</title>
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

    <style>
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        
        /* 背景画像用の設定 */
        #bg {
            position: fixed;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: 0;
        }

        /* ゲーム画面を中央に配置 */
        pyxel-run {
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
    </style>

    <script>
        // 画像を切り替える関数
        function showTitleBG(){ document.getElementById("bg").style.backgroundImage = "url('title.jpg')"; }
        function showWinBG(){ document.getElementById("bg").style.backgroundImage = "url('win.jpg')"; }
        function showLoseBG(){ document.getElementById("bg").style.backgroundImage = "url('lose.jpg')"; }
        function clearBG(){ document.getElementById("bg").style.backgroundImage = "none"; }

        window.onload = function(){ showTitleBG(); }
    </script>
</head>
<body>

    <div id="bg"></div>

    <pyxel-run name="3MOKUTUYOSA02.py"></pyxel-run>

</body>
</html>
