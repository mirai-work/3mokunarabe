<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 3MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#bg{
    position:fixed;
    left:0;
    top:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:-1;
}
</style>
</head>

<body>

<img id="bg" src="title.jpg">

<pyxel-play
    root="."
    name="main.py">
</pyxel-play>

<script>

function showTitleBG(){
    document.getElementById("bg").src="title.jpg";
}

function showWinBG(){
    document.getElementById("bg").src="win.jpg";
}

function showLoseBG(){
    document.getElementById("bg").src="lose.jpg";
}

function clearBG(){
    document.getElementById("bg").style.display="none";
}

window.showTitleBG = showTitleBG;
window.showWinBG   = showWinBG;
window.showLoseBG  = showLoseBG;
window.clearBG     = clearBG;

</script>

</body>
</html>
