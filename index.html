<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>DEBUG MODE</title>
<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
<style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
    #bg { position: fixed; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    pyxel-run { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 1; }
    /* デバッグ用表示 */
    #status { position: absolute; top: 10px; left: 10px; color: yellow; z-index: 999; font-size: 20px; font-weight: bold; }
</style>
</head>
<body>

<div id="status">確認中...</div>
<video id="bg" autoplay loop muted playsinline></video>
<pyxel-run root="." name="3MOKUGAMEATTALETUKI.py"></pyxel-run>

<script>
    let bg = document.getElementById("bg");
    let status = document.getElementById("status");

    bg.onloadeddata = () => { status.innerText = "成功: 動画を読み込みました"; };
    bg.onerror = () => { status.innerText = "エラー: 動画が見つかりません(title.mp4)"; };
    bg.onplay = () => { status.innerText = "再生中: 動画が再生されています"; };
    
    // 自動再生失敗時のケア
    window.onclick = () => { 
        bg.play(); 
        status.innerText = "クリックされました: 再生を試みます";
    };

    function showTitleBG() { 
        bg.src = "title.mp4"; 
        bg.play().catch(() => { status.innerText = "自動再生ブロック中: 画面をクリックしてください"; }); 
    }
    window.onload = showTitleBG;
</script>

</body>
</html>
