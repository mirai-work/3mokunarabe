<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 3MOKU</title>
<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
<style>
html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: black; }

/* 動画を全画面に配置 */
#bg {
    position: fixed;
    left: 0; top: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
}

/* ゲーム画面を中央に */
pyxel-run {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
}
</style>
<script>
// 動画を切り替える関数
function playVideo(fileName) {
    let bg = document.getElementById("bg");
    bg.style.display = "block";
    bg.src = fileName;
    bg.play();
}

// 呼び出し用関数
function showTitleBG() { playVideo("title.mp4"); }
function showWinBG()   { playVideo("win.mp4"); }
function showLoseBG()  { playVideo("lose.mp4"); }

function clearBG() {
    let bg = document.getElementById("bg");
    bg.pause();
    bg.removeAttribute('src');
    bg.load();
    bg.style.display = "none";
}

window.onload = function(){ showTitleBG(); }
</script>
</head>
<body>

<video id="bg" autoplay loop muted playsinline></video>

<pyxel-run root="." name="3MOKUGAMEATTALETUKI.py"></pyxel-run>

</body>
</html>
