<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ATTACK 3MOKU</title>
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
  <style>
    body { 
        margin: 0; 
        background: black; 
        overflow: hidden; 
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    #bg { 
        position: fixed; 
        width: 100vw; 
        height: 100vh; 
        background-size: cover; 
        background-position: center;
        z-index: 1; 
    }
    canvas { 
        z-index: 2; 
        /* 画面に合わせつつ、アスペクト比を維持して拡大 */
        max-width: 90vw;
        max-height: 90vh;
        image-rendering: pixelated;
        /* Pyxelの規定サイズを維持するための枠 */
        border: 2px solid #555;
    }
</style>
</head>
<body>
    <div id="bg"></div>
    <pyxel-run name="3MOKUGAMEATTALETUKI.py"></pyxel-run>

    <script>
        const bg = document.getElementById("bg");

        // Pythonの js.関数名() で呼び出される関数群
        function showTitleBG() { 
            bg.style.backgroundImage = "url('./title.jpg')"; 
        }
        function showWinBG() { 
            bg.style.backgroundImage = "url('./win.jpg')"; 
        }
        function showLoseBG() { 
            bg.style.backgroundImage = "url('./lose.jpg')"; 
        }
        function clearBG() { 
            bg.style.backgroundImage = "none"; 
        }
    </script>
</body>
</html>
