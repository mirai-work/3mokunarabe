<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 5MOKU</title>
<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
<style>
    body { margin:0; width:100vw; height:100vh; overflow:hidden; background:#000; }
    #bg {
        position: fixed; top:0; left:0;
        width: 100vw; height: 100vh;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        z-index: 0;
    }
    pyxel-run {
        position: absolute !important;
        left: 50% !important; top: 50% !important;
        transform: translate(-50%, -50%) !important;
        z-index: 1;
    }
</style>
<script>
    function setBG(file) {
        const bg = document.getElementById("bg");
        bg.style.backgroundImage = `url("${file}")`;
    }
    window.showTitleBG = () => setBG("title.jpg");
    window.showWinBG = () => setBG("win.jpg");
    window.showLoseBG = () => setBG("lose.jpg");
    window.clearBG = () => setBG("");
</script>
</head>
<body>
    <div id="bg"></div>
    <pyxel-run root="." name="gomoku01.py"></pyxel-run>
<script>
window.onload = function(){
    showTitleBG();

    setTimeout(()=>{
        alert("title bg set");
    },1000);
}
</script>    
</body>
</html>
