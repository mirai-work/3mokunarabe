<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 3MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#bg{
    position:fixed;
    left:0;
    top:0;
    width:100vw;
    height:100vh;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:1;
}

canvas{
    position:fixed !important;
    left:50% !important;
    top:50% !important;
    transform:translate(-50%,-50%) !important;
    z-index:2 !important;
    image-rendering:pixelated;
}

.ui{
    position:fixed;
    width:100%;
    text-align:center;
    z-index:5;
    color:white;
    text-shadow:4px 4px 8px black;
    font-family:sans-serif;
}

#title{
    top:10%;
    font-size:64px;
}

#menu{
    top:40%;
    font-size:48px;
}

.menuitem{
    margin:20px;
    cursor:pointer;
}

#win{
    top:15%;
    font-size:80px;
    color:yellow;
    display:none;
}

#lose{
    top:15%;
    font-size:80px;
    color:red;
    display:none;
}

</style>

<script>

let selectedLevel = 0;

function hideAll(){
    document.getElementById("title").style.display="none";
    document.getElementById("menu").style.display="none";
    document.getElementById("win").style.display="none";
    document.getElementById("lose").style.display="none";
}

function selectLevel(level){

    selectedLevel = level;

    if(window.pyodide){
        try{
            pyodide.globals.set("HTML_LEVEL",level);
        }catch(e){}
    }

}

function showTitle(){

    document.getElementById("bg").style.backgroundImage =
        "url('./title.jpg')";

    hideAll();

    document.getElementById("title").style.display="block";
    document.getElementById("menu").style.display="block";
}

function showGame(){

    document.getElementById("bg").style.backgroundImage = "none";

    hideAll();

}

function showWin(){

    document.getElementById("bg").style.backgroundImage =
        "url('./win.jpg')";

    hideAll();

    document.getElementById("win").style.display="block";
}

function showLose(){

    document.getElementById("bg").style.backgroundImage =
        "url('./lose.jpg')";

    hideAll();

    document.getElementById("lose").style.display="block";
}

window.onload=function(){
    showTitle();
}

</script>

</head>

<body>

<div id="bg"></div>

<div id="title" class="ui">
ATTACK 3MOKU
</div>

<div id="menu" class="ui">

<div class="menuitem">LV1</div>
<div class="menuitem">LV2</div>
<div class="menuitem">LV3</div>

</div>

<div id="win" class="ui">
WIN!
</div>

<div id="lose" class="ui">
LOSE!
</div>

<pyxel-run
root="."
name="3MOKUGAMEATTALETUKI.py">
</pyxel-run>

</body>
</html>
