<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 3MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#bg{
    position:fixed;
    left:0;
    top:0;
    width:100vw;
    height:100vh;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:1;
}

canvas{
    position:fixed !important;
    left:50% !important;
    top:50% !important;
    transform:translate(-50%,-50%) !important;
    z-index:2 !important;
    image-rendering:pixelated;
}

.ui{
    position:fixed;
    width:100%;
    text-align:center;
    z-index:5;
    font-family:sans-serif;
    color:white;
    text-shadow:4px 4px 8px black;
}

#title{
    top:10%;
    font-size:64px;
}

#menu{
    top:35%;
    font-size:48px;
}

#win{
    top:15%;
    font-size:80px;
    color:yellow;
    display:none;
}

#lose{
    top:15%;
    font-size:80px;
    color:red;
    display:none;
}
</style>

<script>

function hideAll(){
    document.getElementById("title").style.display="none";
    document.getElementById("menu").style.display="none";
    document.getElementById("win").style.display="none";
    document.getElementById("lose").style.display="none";
}

function showTitle(){
    document.getElementById("bg").style.backgroundImage =
        "url('./title.jpg')";
    hideAll();
    document.getElementById("title").style.display="block";
    document.getElementById("menu").style.display="block";
}

function showGame(){
    document.getElementById("bg").style.backgroundImage = "none";
    hideAll();
}

function showWin(){
    document.getElementById("bg").style.backgroundImage =
        "url('./win.jpg')";
    hideAll();
    document.getElementById("win").style.display="block";
}

function showLose(){
    document.getElementById("bg").style.backgroundImage =
        "url('./lose.jpg')";
    hideAll();
    document.getElementById("lose").style.display="block";
}

window.onload = showTitle;

</script>

</head>

<body>

<div id="bg"></div>

<div id="title" class="ui">
ATTACK 3MOKU
</div>

<div id="menu" class="ui">
LV1<br>
LV2<br>
LV3
</div>

<div id="win" class="ui">
WIN!
</div>

<div id="lose" class="ui">
LOSE!
</div>

<pyxel-run
root="."
name="3MOKUGAMEATTALETUKI.py"> </pyxel-run>

</body>
</html>
