<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ATTACK 5MOKU</title>
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
    <style>
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        
        /* 背景画像を表示するための設定 */
        #bg {
            position: fixed;
            left: 0; top: 0;
            width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            background-color: #333; /* 画像が出ない時でも確認できるように色をつける */
        }

        /* ゲーム画面を中央に配置 */
        pyxel-run {
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <pyxel-run name="gomoku01.py"></pyxel-run>

  <script>
const bg = document.getElementById("bg");

setInterval(() => {

    if (!window.pyxel_app) return;

    const scene = window.pyxel_app.scene;
    const status = window.pyxel_app.status;

    console.log(scene, status);

    let targetUrl = "";

    switch (scene) {

        case "TITLE_START":
        case "TITLE":
            targetUrl = "title.jpg";
            break;

        case "RESULT_START":

            if (status === 1) {
                targetUrl = "win.jpg";
            }
            else if (status === 2) {
                targetUrl = "lose.jpg";
            }

            break;

        default:
            targetUrl = "";
            break;
    }

    if (targetUrl) {
        bg.style.backgroundImage = `url('${targetUrl}')`;
    }
    else {
        bg.style.backgroundImage = "";
    }

}, 100);
</script>
</body>
</html>
