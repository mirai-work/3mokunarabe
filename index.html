<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 5MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#bg{
    position:fixed;
    inset:0;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:0;
    pointer-events:none;
    transition:opacity 0.3s;
}

pyxel-run{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:1;
}
</style>
</head>

<body>

<div id="bg"></div>

<pyxel-run name="gomoku01.py"></pyxel-run>

<script>

const bg = document.getElementById("bg");

/* --------------------
   Pythonから呼ばれる関数
-------------------- */

function showTitleBG(){
    bg.style.backgroundImage = "url('title.jpg')";
}

function showWinBG(){
    bg.style.backgroundImage = "url('win.jpg')";
}

function showLoseBG(){
    bg.style.backgroundImage = "url('lose.jpg')";
}

function showDrawBG(){
    bg.style.backgroundImage = "url('draw.jpg')";
}

function clearBG(){
    bg.style.backgroundImage = "none";
}

/* グローバル公開 */
window.showTitleBG = showTitleBG;
window.showWinBG   = showWinBG;
window.showLoseBG  = showLoseBG;
window.showDrawBG  = showDrawBG;
window.clearBG     = clearBG;

/* --------------------
   draw判定だけ補助
-------------------- */

function monitorResult(){

    if(window.pyxel_app){

        if(
            window.pyxel_app.scene === "RESULT_START" &&
            window.pyxel_app.status === 3
        ){
            showDrawBG();
        }
    }

    requestAnimationFrame(monitorResult);
}

monitorResult();

</script>

</body>
</html>
