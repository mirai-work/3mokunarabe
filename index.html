<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 3MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#bg{
    position:fixed;
    left:0;
    top:0;
    width:100vw;
    height:100vh;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:1;
}

/* タイトル */
#title_text{
    position:fixed;
    top:15%;
    width:100%;
    text-align:center;
    font-size:64px;
    color:white;
    text-shadow:4px 4px 8px black;
    z-index:5;
    display:none;
}

/* 勝利 */
#win_text{
    position:fixed;
    top:15%;
    width:100%;
    text-align:center;
    font-size:80px;
    font-weight:bold;
    color:yellow;
    text-shadow:5px 5px 10px black;
    z-index:5;
    display:none;
}

/* 敗北 */
#lose_text{
    position:fixed;
    top:15%;
    width:100%;
    text-align:center;
    font-size:80px;
    font-weight:bold;
    color:red;
    text-shadow:5px 5px 10px black;
    z-index:5;
    display:none;
}

canvas{
    position:fixed !important;
    left:50% !important;
    top:50% !important;
    transform:translate(-50%,-50%) !important;
    z-index:2 !important;
    image-rendering:pixelated;
}

</style>

<script>

function hideAllText(){

    document.getElementById("title_text").style.display="none";
    document.getElementById("win_text").style.display="none";
    document.getElementById("lose_text").style.display="none";

}

function showTitle(){

    document.getElementById("bg").style.backgroundImage =
        "url('./title.jpg')";

    hideAllText();

    document.getElementById("title_text").style.display="block";
}

function showGame(){

    document.getElementById("bg").style.backgroundImage = "none";

    hideAllText();

}

function showWin(){

    document.getElementById("bg").style.backgroundImage =
        "url('./win.jpg')";

    hideAllText();

    document.getElementById("win_text").style.display="block";
}

function showLose(){

    document.getElementById("bg").style.backgroundImage =
        "url('./lose.jpg')";

    hideAllText();

    document.getElementById("lose_text").style.display="block";
}

window.onload = function(){

    showTitle();

};

</script>

</head>

<body>

<div id="bg"></div>

<div id="title_text">
ATTACK 3MOKU
</div>

<div id="win_text">
WIN!
</div>

<div id="lose_text">
LOSE!
</div>

<pyxel-run
root="."
name="3MOKUGAMEATTALETUKI.py">
</pyxel-run>

</body>
</html>
