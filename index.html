<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ATTACK 3MOKU</title>

    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
            font-family: sans-serif;
        }

        /* 背景レイヤー */
        #bg {
            position: fixed;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            z-index: 1; /* canvasより手前にならないよう調整 */
            
            /* 【重要】画像を表示しつつ、クリック判定を下の層に透過させる */
            pointer-events: none; 
            
            transition: background-image 0.3s ease;
        }

        /* Pyxel画面 */
        canvas {
            position: fixed !important;
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%) !important;
            display: block !important;
            z-index: 10 !important;
            image-rendering: pixelated;
        }
    </style>

    <script>
        function showTitle() {
            document.getElementById("bg").style.backgroundImage = "url('./title.jpg')";
        }

        function showGame() {
            // ゲーム中は画像を非表示にしてPyxelの盤面を見せる
            document.getElementById("bg").style.backgroundImage = "none";
        }

        function showWin() {
            document.getElementById("bg").style.backgroundImage = "url('./win.jpg')";
        }

        function showLose() {
            document.getElementById("bg").style.backgroundImage = "url('./lose.jpg')";
        }

        window.onload = function() {
            showTitle();
        }
    </script>
</head>

<body>

    <div id="bg"></div>

    <pyxel-run root="." name="3MOKUGAMEATTALETUKI.py"></pyxel-run>

</body>
</html>
