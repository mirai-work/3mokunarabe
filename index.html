<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 5MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#bg{
    position:fixed;
    inset:0;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:0;
}

/* ゲームを中央表示 */
#game{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:10;
}

/* Pyxel背景を透過 */
canvas{
    background:transparent !important;
}
</style>
</head>
<body>

<div id="bg"></div>

<div id="game">
    <pyxel-run root="." name="gomoku01.py"></pyxel-run>
</div>

<script>

const bg = document.getElementById("bg");

/* 起動直後 */
bg.style.backgroundImage = "url('title.jpg')";

let currentScene = "";
let currentStatus = -1;

function updateBG(){

    const app = window.pyxel_app;

    if(app){

        if(
            app.scene !== currentScene ||
            app.status !== currentStatus
        ){

            currentScene = app.scene;
            currentStatus = app.status;

            console.log(
                "scene:",
                currentScene,
                "status:",
                currentStatus
            );

            switch(currentScene){

                case "TITLE_START":
                case "TITLE":
                    bg.style.backgroundImage =
                        "url('title.jpg')";
                    break;

                case "RESULT_START":

                    switch(currentStatus){

                        case 1:
                            bg.style.backgroundImage =
                                "url('win.jpg')";
                            break;

                        case 2:
                            bg.style.backgroundImage =
                                "url('lose.jpg')";
                            break;

                        default:
                            bg.style.backgroundImage =
                                "url('title.jpg')";
                    }

                    break;

                default:
                    bg.style.backgroundImage = "none";
            }
        }
    }

    requestAnimationFrame(updateBG);
}

updateBG();

</script>

</body>
</html>
