<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 5MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#bg{
    position:fixed;
    inset:0;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:0;
}

#game{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:1;
}

canvas{
    background:transparent !important;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="game">
    <pyxel-run root="." name="gomoku01.py"></pyxel-run>
</div>

<script>

const bg = document.getElementById("bg");

window.showTitleBG = function(){
    bg.style.backgroundImage = "url('title.jpg')";
};

window.showWinBG = function(){
    bg.style.backgroundImage = "url('win.jpg')";
};

window.showLoseBG = function(){
    bg.style.backgroundImage = "url('lose.jpg')";
};

window.clearBG = function(){
    bg.style.backgroundImage = "none";
};

/* 起動直後 */
showTitleBG();

</script>

</body>
</html>
