<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ATTACK 5MOKU</title>
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
    <style>
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        
        /* 背景画像 */
        #bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            background-repeat: no-repeat; z-index: 0;
            transition: background-image 0.5s;
        }

        /* ゲーム画面（最初は非表示にしておく） */
        #game-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 1;
            display: none; 
        }
    </style>
</head>
<body>

    <div id="bg"></div>
    
    <div id="game-container">
        <pyxel-run name="gomoku01.py"></pyxel-run>
    </div>

    <script>
        const bg = document.getElementById("bg");
        const gameContainer = document.getElementById("game-container");

        function updateDisplay() {
            // Python側の状態を監視（window.pyxel_appが準備できるまで待つ）
            if (window.pyxel_app) {
                const scene = window.pyxel_app.scene;
                const status = window.pyxel_app.status;

                if (scene === "TITLE" || scene === "TITLE_START") {
                    bg.style.backgroundImage = "url('title.jpg')";
                    gameContainer.style.display = "none"; // ゲーム画面を消す
                } 
                else if (scene === "RESULT_START") {
                    gameContainer.style.display = "none"; // ゲーム画面を消す
                    if (status === 1) bg.style.backgroundImage = "url('win.jpg')";
                    else if (status === 2) bg.style.backgroundImage = "url('lose.jpg')";
                } 
                else {
                    bg.style.backgroundImage = "none";    // ゲーム中は背景を消す
                    gameContainer.style.display = "block"; // ゲーム画面を表示
                }
            }
            requestAnimationFrame(updateDisplay);
        }
        updateDisplay();
    </script>
</body>
</html>
