<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ATTACK 5MOKU</title>
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
    <style>
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        
        /* 背景画像レイヤー */
        #bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            background-repeat: no-repeat; z-index: 0;
            transition: background-image 0.5s;
        }

        /* PyxelのCanvasを透過させ、背景を見せる */
        canvas { background-color: transparent !important; }

        /* ゲームコンテナ */
        #game-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 1;
        }
    </style>
</head>
<body>

    <div id="bg"></div>
    
    <div id="game-container">
        <pyxel-run name="gomoku01.py"></pyxel-run>
    </div>

    <script>
        const bg = document.getElementById("bg");
        const gameContainer = document.getElementById("game-container");

        function updateDisplay() {
            if (window.pyxel_app) {
                const scene = window.pyxel_app.scene;
                const status = window.pyxel_app.status;

                // 状態に応じた背景切り替え
                if (scene === "TITLE" || scene === "TITLE_START") {
                    bg.style.backgroundImage = "url('title.jpg')";
                } 
                else if (scene === "RESULT_START") {
                    if (status === 1) bg.style.backgroundImage = "url('win.jpg')";
                    else if (status === 2) bg.style.backgroundImage = "url('lose.jpg')";
                    else bg.style.backgroundImage = "url('title.jpg')"; // 引き分け等はデフォルト
                } 
                else {
                    // ゲームプレイ中は背景画像を消す（必要であれば透明にする）
                    bg.style.backgroundImage = "none";
                }
            }
            requestAnimationFrame(updateDisplay);
        }
        updateDisplay();
    </script>
</body>
</html>
