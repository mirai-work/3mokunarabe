<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 5MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;

    background:url("title.jpg")
        center center / cover no-repeat;
}

pyxel-run{
    background:transparent !important;
}

canvas{
    background:transparent !important;
}

#game{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}
</style>

</head>
<body>

<div id="game">
    <pyxel-run root="." name="gomoku01.py"></pyxel-run>
</div>

</body>
</html>
<script>
window.addEventListener("load", () => {

    setTimeout(() => {

        const canvas = document.querySelector("canvas");

        if(canvas){

            canvas.style.background = "transparent";
            canvas.style.width = "46px";
            canvas.style.height = "56px";
            canvas.style.position = "relative";
            canvas.style.zIndex = "10";

        }

    },1000);

});
</script>
<script>

window.addEventListener("load", () => {

    setTimeout(() => {

        const pyxelRun =
            document.querySelector("pyxel-run");

        if(pyxelRun){

            pyxelRun.style.position = "absolute";
            pyxelRun.style.left = "50%";
            pyxelRun.style.top = "50%";
            pyxelRun.style.transform =
                "translate(-50%,-50%)";

            pyxelRun.style.background =
                "transparent";
        }

        const canvas =
            document.querySelector("canvas");

        if(canvas){

            canvas.style.background =
                "transparent";

            canvas.style.display =
                "block";
        }

    },1000);

});

</script>
