<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ATTACK 3MOKU</title>
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
    <style>
        body { margin: 0; background-color: black; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; }
        #bg { width: 640px; height: 360px; object-fit: cover; border: 2px solid #333; cursor: pointer; }
        pyxel-run { margin-top: 20px; }
        #msg { margin-bottom: 10px; font-size: 18px; }
    </style>
</head>
<body>

    <div id="msg">動画を表示するにはここをクリックしてください</div>
    <video id="bg" loop muted playsinline></video>
    <pyxel-run root="." name="3MOKUGAMEATTALETUKI.py"></pyxel-run>

    <script>
        let bg = document.getElementById("bg");
        let msg = document.getElementById("msg");

        // クリックされたら動画を読み込んで再生する
        document.body.onclick = function() {
            if (bg.src === "") {
                bg.src = "title.mp4";
                bg.play();
                msg.innerText = "ゲーム開始！";
            }
        };
    </script>
</body>
</html>
