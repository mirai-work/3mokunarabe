<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>画面切り替え</title>

<style>
body {
    margin: 0;
    overflow: hidden;
}

.screen {
    width: 100vw;
    height: 100vh;
    display: none;
    font-size: 50px;
    color: white;
    text-align: center;
    line-height: 100vh;
}

#title { background: black; display: block; }
#game  { background: green; }
#win   { background: blue; }
#lose  { background: red; }
</style>

<script>
function showScreen(id){
    document.querySelectorAll(".screen").forEach(s=>{
        s.style.display = "none";
    });
    document.getElementById(id).style.display = "block";
}
</script>

</head>

<body>

<div id="title" class="screen" onclick="showScreen('game')">
TITLE（クリックで開始）
</div>

<div id="game" class="screen" onclick="showScreen('win')">
GAME（クリックで勝利）
</div>

<div id="win" class="screen" onclick="showScreen('lose')">
WIN（クリックで敗北）
</div>

<div id="lose" class="screen" onclick="showScreen('title')">
LOSE（クリックでタイトル）
</div>

</body>
</html>
