<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 5MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#bgimage{
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

canvas{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:1;
}
</style>

<script>
let bgimage = null;

function setBG(filename){
    if(!bgimage){
        bgimage = document.getElementById("bgimage");
    }
    bgimage.src = filename;
}

function showTitleBG(){
    setBG("title.jpg");
}

function showWinBG(){
    setBG("win.jpg");
}

function showLoseBG(){
    setBG("lose.jpg");
}

function clearBG(){
    if(!bgimage){
        bgimage = document.getElementById("bgimage");
    }
    bgimage.removeAttribute("src");
}

window.onload = function(){
    showTitleBG();
};
</script>
</head>

<body>

<img id="bgimage" alt="background">

<pyxel-run
root="."
script="5moku.py">
</pyxel-run>

</body>
</html>
