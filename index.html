<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ATTACK 5MOKU</title>
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
    <style>
        html, body { 
            margin: 0; width: 100%; height: 100%; overflow: hidden; background: black; 
        }
        
        #bg {
            position: fixed; left: 0; top: 0; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            background-repeat: no-repeat; z-index: 0;
            transition: opacity 0.5s ease;
        }

        #game-container {
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%); z-index: 1;
        }

        /* PyxelのCanvasを強制的に透過 */
        canvas { background: transparent !important; }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div id="game-container">
        <pyxel-run root="." name="gomoku01.py"></pyxel-run>
    </div>

    <script>
        const bg = document.getElementById("bg");

        function updateBackground() {
            if (window.pyxel_app) {
                const scene = window.pyxel_app.scene;
                const status = window.pyxel_app.status;

                // 状態に応じた画像の切り替え
                if (scene === "TITLE" || scene === "TITLE_START") {
                    bg.style.backgroundImage = "url('title.jpg')";
                    bg.style.opacity = "1";
                } 
                else if (scene === "RESULT_START") {
                    if (status === 1) bg.style.backgroundImage = "url('win.jpg')";
                    else if (status === 2) bg.style.backgroundImage = "url('lose.jpg')";
                    else bg.style.backgroundImage = "url('title.jpg')";
                    bg.style.opacity = "1";
                } 
                else {
                    // ゲームプレイ中は背景を隠す（opacityを0にする）
                    bg.style.opacity = "0";
                }
            }
            requestAnimationFrame(updateBackground);
        }
        updateBackground();
    </script>
</body>
</html>
