<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#bg{
    position:fixed;
    left:0;
    top:0;
    width:100vw;
    height:100vh;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:-1;
}

canvas{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:1;
}
</style>

<script>
function showTitleBG(){
    document.getElementById("bg").style.backgroundImage =
    "url('./title.jpg')";
}

function showWinBG(){
    document.getElementById("bg").style.backgroundImage =
    "url('./win.jpg')";
}

function showLoseBG(){
    document.getElementById("bg").style.backgroundImage =
    "url('./lose.jpg')";
}

function clearBG(){
    document.getElementById("bg").style.backgroundImage = "none";
}

window.onload = function(){
    showTitleBG();
}
</script>
