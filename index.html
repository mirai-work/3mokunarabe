<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ATTACK 3MOKU</title>
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
    <style>
        body {
            margin: 0;
            background-color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }

        /* 動画を表示するエリア */
        #bg {
            width: 640px; /* 必要に応じてサイズ調整してください */
            height: 360px;
            object-fit: cover;
            border: 2px solid #333;
        }

        /* Pyxelゲーム画面 */
        pyxel-run {
            margin-top: 20px;
        }
    </style>
    <script>
        // 動画再生と切り替えの管理
        function playVideo(fileName) {
            let bg = document.getElementById("bg");
            bg.src = fileName;
            bg.play().catch(e => {
                console.log("クリック待機中");
            });
        }

        function showTitleBG() { playVideo("title.mp4"); }
        function showWinBG()   { playVideo("win.mp4"); }
        function showLoseBG()  { playVideo("lose.mp4"); }

        window.onload = function() {
            showTitleBG();
        };
    </script>
</head>
<body>

    <video id="bg" autoplay loop muted playsinline></video>

    <pyxel-run root="." name="3MOKUGAMEATTALETUKI.py"></pyxel-run>

</body>
</html>
