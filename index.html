<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 5MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#bg{
    position:fixed;
    inset:0;
    background:url("title.jpg") center center / cover no-repeat;
    z-index:0;
}

pyxel-play{
    position:relative;
    z-index:10;
}
</style>

<script>
window.showTitleBG = function(){
    document.getElementById("bg").style.backgroundImage =
        "url('title.jpg')";
};

window.showWinBG = function(){
    document.getElementById("bg").style.backgroundImage =
        "url('win.jpg')";
};

window.showLoseBG = function(){
    document.getElementById("bg").style.backgroundImage =
        "url('lose.jpg')";
};

window.clearBG = function(){
    document.getElementById("bg").style.backgroundImage = "none";
};
</script>

</head>

<body>

<div id="bg"></div>

<pyxel-play
    root="."
    name="5moku01.py">
</pyxel-play>

</body>
</html>
