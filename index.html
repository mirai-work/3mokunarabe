<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 5MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

#bg{
    position:fixed;
    inset:0;
    background-image:url("title.jpg");
    background-size:cover;
    background-position:center;
    z-index:-1;
}

/* pyxel-play自身を透明化 */
pyxel-play{
    background:transparent !important;
}

/* Canvasも透明化 */
canvas{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    background:transparent !important;
    z-index:1;
}
pyxel-run{
    position:absolute !important;
    left:50% !important;
    top:50% !important;
    transform:translate(-50%,-50%) !important;
    background:transparent !important;
    z-index:1;
}

canvas{
    background:transparent !important;
}

body{
    background:url("title.jpg") center center / cover no-repeat;
}    
</style>
<script>

function showTitleBG(){
    document.getElementById("bg").style.backgroundImage =
    "url('title.jpg')";
}

function showWinBG(){
    document.getElementById("bg").style.backgroundImage =
    "url('win.jpg')";
}

function showLoseBG(){
    document.getElementById("bg").style.backgroundImage =
    "url('lose.jpg')";
}

function clearBG(){
    document.getElementById("bg").style.backgroundImage = "none";
}

window.onload = function(){
    showTitleBG();
}

</script>

</head>

<body>
    <div id="bg"></div>

   <pyxel-run
root="."
name="gomoku01.py">
</pyxel-run>
</body>
</html>
