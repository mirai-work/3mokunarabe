<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 3MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

/* 背景画像 */
#bg{
    position:fixed;
    left:0;
    top:0;
    width:100vw;
    height:100vh;

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    z-index:1;
}

/* タイトル文字 */
#titleText{
    position:fixed;
    top:15%;
    width:100%;
    text-align:center;

    color:white;
    font-size:64px;
    font-weight:bold;

    text-shadow:
        3px 3px 8px black,
        -3px -3px 8px black;

    z-index:5;
}

/* レベル選択 */
#levelText{
    position:fixed;
    top:35%;
    width:100%;

    text-align:center;

    color:yellow;
    font-size:42px;
    font-weight:bold;

    text-shadow:
        2px 2px 6px black;

    z-index:5;
}

/* 勝利 */
#winText{
    position:fixed;
    top:20%;
    width:100%;
    text-align:center;

    color:yellow;
    font-size:80px;
    font-weight:bold;

    text-shadow:
        4px 4px 12px black;

    z-index:5;

    display:none;
}

/* 敗北 */
#loseText{
    position:fixed;
    top:20%;
    width:100%;
    text-align:center;

    color:red;
    font-size:80px;
    font-weight:bold;

    text-shadow:
        4px 4px 12px black;

    z-index:5;

    display:none;
}

/* Pyxel */
canvas{
    position:fixed !important;

    left:50% !important;
    top:50% !important;

    transform:translate(-50%,-50%) scale(8) !important;

    image-rendering:pixelated;

    z-index:2 !important;
}
</style>

<script>

function hideAllTexts(){

    document.getElementById("titleText").style.display="none";
    document.getElementById("levelText").style.display="none";
    document.getElementById("winText").style.display="none";
    document.getElementById("loseText").style.display="none";
}

/* タイトル */
function showTitleBG(){

    document.getElementById("bg").style.backgroundImage =
        "url('./title.jpg')";

    hideAllTexts();

    document.getElementById("titleText").style.display="block";
    document.getElementById("levelText").style.display="block";
}

/* ゲーム開始 */
function clearBG(){

    document.getElementById("bg").style.backgroundImage = "none";

    hideAllTexts();
}

/* 勝利 */
function showWinBG(){

    document.getElementById("bg").style.backgroundImage =
        "url('./win.jpg')";

    hideAllTexts();

    document.getElementById("winText").style.display="block";
}

/* 敗北 */
function showLoseBG(){

    document.getElementById("bg").style.backgroundImage =
        "url('./lose.jpg')";

    hideAllTexts();

    document.getElementById("loseText").style.display="block";
}

window.onload = function(){
    showTitleBG();
};

</script>

</head>

<body>

<div id="bg"></div>

<div id="titleText">
ATTACK 3MOKU
</div>

<div id="levelText">
LV1　LV2　LV3<br>
(キー1～3を押してください)
</div>

<div id="winText">
WIN !
</div>

<div id="loseText">
LOSE !
</div>

<pyxel-run
    root="."
    name="3MOKUGAMEATTALETUKI.py">
</pyxel-run>

</body>
</html>
