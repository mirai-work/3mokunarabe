<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 5MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

/* 背景画像 */
#bg{
    position:fixed;
    left:0;
    top:0;
    width:100vw;
    height:100vh;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:0;
}

/* Pyxelを中央表示 */
#game-container{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:1;
}

/* Canvas透過 */
canvas,
pyxel-run{
    background:transparent !important;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="game-container">
    <pyxel-run root="." name="gomoku01.py"></pyxel-run>
</div>

<script>

const bg = document.getElementById("bg");

/* 起動直後はタイトル画像 */
bg.style.backgroundImage = "url('title.jpg')";

function updateBackground(){

    if(window.pyxel_app){

        const scene = window.pyxel_app.scene;
        const status = window.pyxel_app.status;

        switch(scene){

            case "TITLE_START":
            case "TITLE":
                bg.style.backgroundImage =
                    "url('title.jpg')";
                break;

            case "RESULT_START":

                switch(status){

                    case 1:
                        bg.style.backgroundImage =
                            "url('win.jpg')";
                        break;

                    case 2:
                        bg.style.backgroundImage =
                            "url('lose.jpg')";
                        break;

                    default:
                        bg.style.backgroundImage =
                            "url('title.jpg')";
                        break;
                }

                break;

            default:
                bg.style.backgroundImage = "none";
                break;
        }
    }

    requestAnimationFrame(updateBackground);
}

updateBackground();

</script>

</body>
</html>
