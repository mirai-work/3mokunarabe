<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ATTACK 5MOKU</title>
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
    <style>
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        #bg {
            position: fixed; left: 0; top: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            z-index: 0; transition: background-image 0.5s;
        }
        pyxel-run { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 1; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <pyxel-run name="gomoku01.py"></pyxel-run>

    <script>
        // HTML側でPyxelのステータスを監視する
        setInterval(() => {
            const pyxel = window.pyxel; // Pyxelの実行インスタンス
            if (pyxel && pyxel.app) {
                const scene = pyxel.app.scene;
                const status = pyxel.app.status;
                const bg = document.getElementById("bg");

                if (scene === "TITLE") {
                    bg.style.backgroundImage = "url('title.jpg')";
                } else if (scene === "RESULT_START") {
                    if (status === 1) bg.style.backgroundImage = "url('win.jpg')";
                    else if (status === 2) bg.style.backgroundImage = "url('lose.jpg')";
                }
            }
        }, 500); // 0.5秒ごとに状況をチェック
    </script>
</body>
</html>
