<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATTACK 5MOKU</title>
    
    <style>
        :root {
            --bg-color: #000;
        }

        body, html {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        #game-background {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.3s ease;
            z-index: 0;
        }

        pyxel-play {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="game-background" aria-hidden="true"></div>

    <pyxel-play root="." name="3MOKUGAMEATTALETUKI.py"></pyxel-play>

    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
    <script>
        // Use a namespace object to avoid global scope pollution
        const GameUI = {
            element: document.getElementById('game-background'),
            
            setBg(imageName) {
                this.element.style.backgroundImage = imageName ? `url('${imageName}')` : 'none';
            }
        };

        // Expose to window if Pyxel needs to call these externally
        window.showTitleBG = () => GameUI.setBg('title.jpg');
        window.showWinBG   = () => GameUI.setBg('win.jpg');
        window.showLoseBG  = () => GameUI.setBg('lose.jpg');
        window.clearBG     = () => GameUI.setBg(null);

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            window.showTitleBG();
        });
    </script>
</body>
</html>
