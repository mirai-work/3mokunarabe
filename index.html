<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 5MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#bg{
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center center;
    background-repeat:no-repeat;
    z-index:-1;
}

pyxel-run{
    position:absolute !important;
    left:50% !important;
    top:50% !important;
    transform:translate(-50%,-50%) !important;
    z-index:1;
}

canvas{
    background:transparent !important;
}
</style>

<script>

function setBG(file){
    const bg = document.getElementById("bg");

    console.log("背景変更:", file);

    const img = new Image();

    img.onload = function(){
        console.log("画像読込成功:", file);
        bg.style.backgroundImage = `url("${file}")`;
    };

    img.onerror = function(){
        console.error("画像読込失敗:", file);
    };

    img.src = file;
}

function showTitleBG(){
    setBG("title.jpg");
}

function showWinBG(){
    setBG("win.jpg");
}

function showLoseBG(){
    setBG("lose.jpg");
}

function clearBG(){
    document.getElementById("bg").style.backgroundImage = "none";
}

window.showTitleBG = showTitleBG;
window.showWinBG = showWinBG;
window.showLoseBG = showLoseBG;
window.clearBG = clearBG;

window.onload = function(){
    showTitleBG();
};

</script>
</head>

<body>

<div id="bg"></div>

<pyxel-run root="." name="gomoku01.py"></pyxel-run>

</body>
</html>
