<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ATTACK 3MOKU</title>

<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

/* 背景 */
#bg{
    position:fixed;
    left:0;
    top:0;
    width:100vw;
    height:100vh;
    background-size:cover;
    background-position:center;
    z-index:-1;
}

/* Pyxel画面 */
canvas{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}
</style>

<script>

// ======================
// 背景切り替え関数
// ======================
function showTitle(){
    document.getElementById("bg").style.backgroundImage = "url('./title.jpg')";
}

function showGame(){
    document.getElementById("bg").style.backgroundImage = "none";
}

function showWin(){
    document.getElementById("bg").style.backgroundImage = "url('./win.jpg')";
}

function showLose(){
    document.getElementById("bg").style.backgroundImage = "url('./lose.jpg')";
}

window.onload = function(){
    showTitle();
}

</script>

</head>

<body>

<div id="bg"></div>

<pyxel-run root="." name="3MOKUGAMEATTALETUKI.py"></pyxel-run>

</body>
</html>
