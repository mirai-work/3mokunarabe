<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ATTACK 5MOKU</title>
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
    <style>
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        
        /* 背景画像を表示するための設定 */
        #bg {
            position: fixed;
            left: 0; top: 0;
            width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            background-color: #333; /* 画像が出ない時でも確認できるように色をつける */
        }

        /* ゲーム画面を中央に配置 */
        pyxel-run {
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <pyxel-run name="gomoku01.py"></pyxel-run>

    <script>
        // デバッグ用：画像が正しくセットされたか確認するためのログ
        const bg = document.getElementById("bg");

        // 状態監視
        setInterval(() => {
            if (window.pyxel && window.pyxel.app) {
                const scene = window.pyxel.app.scene;
                const status = window.pyxel.app.status;
                
                let targetUrl = "";
                if (scene === "TITLE") {
                    targetUrl = "title.jpg";
                } else if (scene === "RESULT_START") {
                    if (status === 1) targetUrl = "win.jpg";
                    else if (status === 2) targetUrl = "lose.jpg";
                }

                if (targetUrl && bg.style.backgroundImage !== `url("${targetUrl}")`) {
                    bg.style.backgroundImage = `url('${targetUrl}')`;
                    console.log("背景画像を変更しました:", targetUrl);
                }
            }
        }, 500);
    </script>
</body>
</html>
