<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ATTACK 3MOKU</title>
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
    <style>
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        #bg {
            position: fixed; left: 0; top: 0; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            z-index: 1; transition: background-image 0.3s ease;
        }
        /* HTML文字用レイヤー */
        .ui-layer {
            position: fixed; top: 30%; width: 100%; z-index: 5;
            text-align: center; font-family: sans-serif; font-size: 50px;
            color: white; text-shadow: 3px 3px 8px black; display: none;
            pointer-events: none;
        }
        canvas {
            position: fixed !important; left: 50% !important; top: 50% !important;
            transform: translate(-50%, -50%) !important; z-index: 2 !important;
            image-rendering: pixelated; pointer-events: none;
        }
    </style>
    <script>
        function toggleUI(bg, state) {
            document.getElementById("bg").style.backgroundImage = bg;
            document.getElementById("text-title").style.display = (state === "TITLE") ? "block" : "none";
            document.getElementById("text-win").style.display = (state === "WIN") ? "block" : "none";
            document.getElementById("text-lose").style.display = (state === "LOSE") ? "block" : "none";
        }
        function showTitle() { toggleUI("url('./title.jpg')", "TITLE"); }
        function showGame() { toggleUI("none", "NONE"); }
        function showWin() { toggleUI("url('./win.jpg')", "WIN"); }
        function showLose() { toggleUI("url('./lose.jpg')", "LOSE"); }
        window.onload = showTitle;
    </script>
</head>
<body>
    <div id="bg"></div>
    <div id="text-title" class="ui-layer">ATTACK 3MOKU<br><small style="font-size:20px;">CLICK TO START</small></div>
    <div id="text-win" class="ui-layer" style="color: yellow;">YOU WIN!</div>
    <div id="text-lose" class="ui-layer" style="color: red;">GAME OVER</div>
    <pyxel-run root="." name="3MOKUGAMEATTALETUKI.py"></pyxel-run>
</body>
</html>
